    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #2F2F2F;
            --text-alt: #666666;
            --accent: #000000;
            --transition: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        /* Name Styling */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 3rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInBody 0.8s var(--transition) forwards;
        }

        /* Nav Layout */
        nav {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-alt);
            font-size: 1rem;
            font-weight: 400;
            position: relative;
            padding: 8px 0;
            transition: all 0.4s var(--transition);
            opacity: 0;
            transform: translateY(15px);
        }

        /* Icons */
        svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.4s var(--transition);
        }

        /* Hover Effects */
        .nav-item:hover {
            color: var(--accent);
            transform: translateX(5px);
        }

        .nav-item:hover svg {
            transform: scale(1.15) rotate(-5deg);
        }

        /* Animated Underline */
        .nav-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 1px;
            background-color: var(--accent);
            transition: width 0.4s var(--transition);
        }

        .nav-item:hover::after {
            width: 100%;
            left: 0;
        }

        /* Entrance Animations */
        @keyframes fadeInBody {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Staggered load for links */
        .nav-item:nth-child(1) { animation: fadeInBody 0.8s var(--transition) 0.2s forwards; }
        .nav-item:nth-child(2) { animation: fadeInBody 0.8s var(--transition) 0.3s forwards; }
        .nav-item:nth-child(3) { animation: fadeInBody 0.8s var(--transition) 0.4s forwards; }
        .nav-item:nth-child(4) { animation: fadeInBody 0.8s var(--transition) 0.5s forwards; }
        .nav-item:nth-child(5) { animation: fadeInBody 0.8s var(--transition) 0.6s forwards; }

    </style>
</head>
